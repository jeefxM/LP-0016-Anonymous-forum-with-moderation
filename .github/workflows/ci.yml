name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  rust:
    name: Rust (host crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        # rust-toolchain.toml pins 1.94.0 (matches the LEZ workspace).
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      # CI covers the LEZ-independent crates that hold the bounty-required
      # tests (valid_registration, valid_post_proof, moderation cert
      # construction/verification, strike_accumulation, slash_submission,
      # post_rejection_after_revocation). The RISC0 guests, `lez-runner`, and
      # `proof-daemon` need the sibling LEZ checkout + docker and are built on
      # the host (ADR-004); `proof-host` pulls the heavy risc0 host prover.
      # The full end-to-end run against a standalone sequencer is
      # `sdk/tests/lifecycle.mjs` (see README) — it needs a LEZ sequencer and
      # is run on the build host, not in GitHub-hosted CI.
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude proof-host --all-targets
      - run: cargo test --workspace --exclude proof-host

  typescript:
    name: TypeScript (SDK + app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
